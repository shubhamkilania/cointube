<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - CoinTube</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#080811;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
color:white;
}

.box{
width:100%;
max-width:420px;
background:#111;
padding:30px;
border-radius:22px;
border:1px solid #222;
box-shadow:0 0 30px rgba(123,44,255,.15);
}

.logo{
font-size:42px;
font-weight:900;
text-align:center;
margin-bottom:10px;
background:linear-gradient(90deg,#ffd700,#7b2cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;
color:#999;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#1c1c28;
color:white;
font-size:15px;
}

input:focus{
outline:2px solid #7b2cff;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:bold;
background:linear-gradient(90deg,#7b2cff,#a855f7);
color:white;
transition:.3s;
}

button:hover{
opacity:.9;
}

#statusText{
margin-top:15px;
text-align:center;
color:#ffd700;
min-height:20px;
}

.link{
margin-top:20px;
text-align:center;
color:#999;
}

.link a{
color:#00b7ff;
text-decoration:none;
}

.link a:hover{
text-decoration:underline;
}

</style>
</head>
<body>

<div class="box">

<div class="logo">
CoinTube
</div>

<div class="subtitle">
Create your CoinTube account
</div>

<input
id="username"
type="text"
placeholder="Username"
>

<input
id="email"
type="email"
placeholder="Email Address"
>

<input
id="password"
type="password"
placeholder="Password"
>

<div
id="refInfo"
style="
display:none;
background:#1c1c28;
padding:14px;
margin-bottom:15px;
border-radius:12px;
color:#ffd700;
text-align:center;
">
Joined via referral:
<span id="refCodeText"></span>
</div>

<button id="registerBtn">
Create Account
</button>

<div id="statusText"></div>

<div class="link">
Already have an account?
<a href="login.html">Login</a>
</div>

</div>

  <script>

const params =
new URLSearchParams(
window.location.search
);

const ref =
params.get("ref");

if(ref){

const box =
document.getElementById(
"refInfo"
);

const text =
document.getElementById(
"refCodeText"
);

box.style.display =
"block";

text.innerText =
ref;

}

</script>

<script type="module" src="register.js"></script>

</body>
</html>
