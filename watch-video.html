<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Video - CoinTube</title>

<style>

body{
background:#080811;
color:white;
font-family:Arial,sans-serif;
padding:30px;
text-align:center;
margin:0;
}

.logo{
font-size:40px;
font-weight:bold;
margin-bottom:20px;
background:linear-gradient(90deg,#ffd700,#7b2cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.box{
background:#111;
padding:25px;
border-radius:20px;
max-width:900px;
margin:auto;
border:1px solid #222;
}

.timer{
font-size:30px;
color:#ffd700;
margin:20px 0;
}

.reward{
font-size:22px;
color:#00ff99;
margin-bottom:20px;
}

button{
padding:15px 30px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
background:linear-gradient(90deg,#7b2cff,#a855f7);
color:white;
}

button:disabled{
background:#444;
cursor:not-allowed;
}

iframe{
width:100%;
height:500px;
border:none;
border-radius:15px;
}

</style>
</head>
<body>

<div class="logo">
CoinTube
</div>

<div class="box">

<h2>🎥 Watch Full Video</h2>

<p style="color:#00b7ff;">
Stay on this page until timer finishes
</p>

<br>

<iframe
src="https://www.youtube.com/embed/jNQXAC9IVRw?autoplay=1&mute=1"
allow="autoplay"
allowfullscreen>
</iframe>

<div class="timer" id="timer">
30
</div>

<div class="reward">
Reward: +10 Coins
</div>

<button id="claimBtn" disabled>
Watch First
</button>

</div>
  
<button onclick="location.href='video-task.html'">
⬅ Back
</button>
  
<script type="module">

import { supabase } from "./supabase.js";

let time = 30;
let canClaim = false;

const timer =
document.getElementById("timer");

const claimBtn =
document.getElementById("claimBtn");

const currentTask =
parseInt(
sessionStorage.getItem("currentTask")
);

if(
!currentTask ||
currentTask < 1 ||
currentTask > 3
){
location.href =
"video-task.html";
throw new Error("Invalid Task");
}

async function checkTaskStatus(){

const {
data:{ user }
} =
await supabase.auth.getUser();

if(!user){
location.href = "login.html";
return;
}

const today =
new Date()
.toISOString()
.split("T")[0];

const {
data: allTasks,
error
} =
await supabase
.from("video_tasks")
.select("*")
.eq("user_id", user.id);

const completedToday =
(allTasks || [])
.filter(task => {

const taskDate =
new Date(task.completed_at)
.toISOString()
.split("T")[0];

return taskDate === today;

});

const completed =
completedToday.map(
t => t.task_number
);

if(error){
console.error(error);
return;
}

const completed =
allTasks
? allTasks.map(
t => t.task_number
)
: [];

if(
currentTask === 2 &&
!completed.includes(1)
){
alert("Complete Task 1 first");
location.href =
"video-task.html";
return;
}

if(
currentTask === 3 &&
!completed.includes(2)
){
alert("Complete Task 2 first");
location.href =
"video-task.html";
return;
}

if(
completed.includes(currentTask)
){

timer.innerHTML =
"✅ Already Completed";

claimBtn.disabled = true;
claimBtn.innerHTML =
"Completed";

return;
}

startTimer();

}

function startTimer(){

const interval =
setInterval(()=>{

time--;

timer.innerHTML =
"⏳ " +
time +
" sec";

if(time <= 0){

clearInterval(interval);

canClaim = true;

timer.innerHTML =
"✅ Video Completed";

claimBtn.disabled =
false;

claimBtn.innerHTML =
"Claim Reward";

}

},1000);

}

claimBtn.onclick =
async ()=>{

if(!canClaim){
alert(
"Watch the full video first"
);
return;
}

claimBtn.disabled = true;

try{

const {
data:{ user }
} =
await supabase.auth.getUser();

if(!user){
location.href =
"login.html";
return;
}

const today =
new Date()
.toISOString()
.split("T")[0];

const {
data: alreadyDone,
error: alreadyDoneError
} =
await supabase
.from("video_tasks")
.select("*")
.eq("user_id", user.id)
.eq("task_number", currentTask);

const completedToday =
(alreadyDone || [])
.filter(task => {

const taskDate =
new Date(task.completed_at)
.toISOString()
.split("T")[0];

return taskDate === today;

});
if(alreadyDoneError){
throw alreadyDoneError;
}

if(
completedToday.length > 0
){
alert(
"Task already completed"
);
return;
}

const {
data: profile,
error: profileError
} =
await supabase
.from("profiles")
.select("*")
.eq("id", user.id)
.single();

if(profileError){
throw profileError;
}

const {
error: updateError
} =
await supabase
.from("profiles")
.update({

coins:
(profile.coins || 0) + 10,

videos_watched:
(profile.videos_watched || 0) + 1

})
.eq("id", user.id);

if(updateError){
throw updateError;
}

const {
error: taskError
} =
await supabase
.from("video_tasks")
.insert({

user_id:
user.id,

task_number:
currentTask

});

if(taskError){
throw taskError;
}

alert(
"🎉 +10 Coins Added"
);

location.href =
"video-task.html";

}catch(err){

console.error(err);

alert(
"Error: " +
err.message
);

claimBtn.disabled = false;

}

};

checkTaskStatus();

</script>

<script type="module" src="auth-check.js"></script>

</body>
</html>
