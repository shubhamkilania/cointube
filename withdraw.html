<!DOCTYPE html>
<html>
<head>
<title>Withdraw</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.box {
    width: 340px;
    margin: 60px auto;
    padding: 20px;
    background: #1e293b;
    border-radius: 12px;
}

input, select {
    width: 90%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
}

button {
    padding: 12px;
    width: 95%;
    background: #22c55e;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
    <h2>Withdraw Coins</h2>

    <p>Balance: <span id="coins"></span> coins</p>
    <p>1000 coins = ₹10</p>

    <input id="amount" placeholder="Enter coins">

    <select id="method">
        <option>UPI</option>
        <option>Bank</option>
        <option>Card</option>
    </select>

    <input id="details" placeholder="Enter payment details">

    <button onclick="withdraw()">Withdraw</button>

    <p id="msg"></p>
</div>

<script>
let coins = parseInt(localStorage.getItem("coins") || "0");
document.getElementById("coins").innerText = coins;

function withdraw() {
    let amt = parseInt(document.getElementById("amount").value);
    let method = document.getElementById("method").value;
    let details = document.getElementById("details").value;
    let msg = document.getElementById("msg");

    if (!amt || amt < 1000) {
        msg.innerText = "Minimum 1000 coins required";
        return;
    }

    if (amt > coins) {
        msg.innerText = "Not enough coins";
        return;
    }

    if (!details) {
        msg.innerText = "Enter payment details";
        return;
    }

    let money = (amt / 1000) * 10;

    coins -= amt;
    localStorage.setItem("coins", coins);

    document.getElementById("coins").innerText = coins;

    msg.innerText = "Withdraw request sent: ₹" + money;
}
</script>

</body>
</html>
