<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Tasks - CoinTube</title>

<style>

body{
background:#080811;
color:white;
font-family:Arial,sans-serif;
padding:20px;
margin:0;
}

.logo{
font-size:40px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
background:linear-gradient(90deg,#ffd700,#7b2cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.card{
background:#111;
padding:25px;
border-radius:20px;
margin-bottom:20px;
border:1px solid #222;
}

.task-title{
font-size:24px;
margin-bottom:10px;
color:#00b7ff;
}

.reward{
color:#00ff99;
font-weight:bold;
margin-bottom:15px;
}

.status{
margin-bottom:15px;
color:#ffd700;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
background:linear-gradient(90deg,#7b2cff,#a855f7);
color:white;
}

button:disabled{
background:#444;
cursor:not-allowed;
}

.back{
margin-bottom:20px;
}

.progress{
font-size:18px;
color:#00ff99;
margin-top:10px;
}

</style>
</head>
<body>

<div class="logo">CoinTube</div>

<div class="card">
<h2 style="color:#ffd700;">🎯 Video Progress</h2>
<div id="progress" class="progress">
Loading...
</div>
</div>

<div class="card">

<div class="task-title">
🎥 Task 1
</div>

<div class="reward">
+10 Coins
</div>

<div class="status" id="status1">
Available
</div>

<button id="task1" onclick="openTask(1)">
Start Task
</button>

</div>

<div class="card">

<div class="task-title">
🎥 Task 2
</div>

<div class="reward">
+10 Coins
</div>

<div class="status" id="status2">
Locked
</div>

<button id="task2" disabled onclick="openTask(2)">
Start Task
</button>

</div>

<div class="card">

<div class="task-title">
🎥 Task 3
</div>

<div class="reward">
+10 Coins
</div>

<div class="status" id="status3">
Locked
</div>

<button id="task3" disabled onclick="openTask(3)">
Start Task
</button>

</div>
  
  <button class="back"
onclick="location.href='home.html'">
🏠 Back Home
</button>

<script type="module">

import { supabase } from "./supabase.js";

async function loadTasks(){

try{

  // all code

}catch(err){

  console.error(err);

}
}

  const {
    data:{ user }
  } = await supabase.auth.getUser();

  if(!user){
    location.href = "login.html";
    return;
  }

  const { data: tasks, error } =
await supabase
.from("video_tasks")
.select("task_number")
.eq("user_id", user.id);

if(error){
  console.error(error);
  return;
}

  const completed =
  tasks
  ? tasks.map(t => t.task_number)
  : [];

  for(let i=1;i<=3;i++){

    const btn =
    document.getElementById(
      "task"+i
    );

    const status =
    document.getElementById(
      "status"+i
    );

    if(completed.includes(i)){

      status.innerHTML =
      "✅ Completed";

      btn.disabled = true;

      btn.innerText =
      "Completed";

    }

  }

  if(
    !completed.includes(1)
  ){

    document.getElementById("task1").disabled = false;
document.getElementById("status1").innerHTML =
"🟢 Available";

  }

  if(
    completed.includes(1)
    &&
    !completed.includes(2)
  ){

    document.getElementById("task2").disabled = false;
document.getElementById("status2").innerHTML =
"🟢 Available";

  }

  if(
    completed.includes(2)
    &&
    !completed.includes(3)
  ){

    document.getElementById("task3").disabled = false;
document.getElementById("status3").innerHTML =
"🟢 Available";
  }

  document.getElementById(
    "progress"
  ).innerHTML =
  "🎯 Completed "
  +
  completed.length
  +
  "/3 Tasks";

}

window.openTask = function(task){

  sessionStorage.setItem(
    "currentTask",
    task
  );

  location.href =
  "watch-video.html";

};

loadTasks();

</script>


<script type="module" src="auth-check.js"></script>
 
</body>
</html>
