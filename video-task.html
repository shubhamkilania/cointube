<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Video Tasks - CoinTube</title>

<style>

body{
background:#080811;
color:white;
font-family:Arial;
padding:30px;
}

.logo{
font-size:40px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
background:linear-gradient(90deg,#ffd700,#7b2cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.card{
background:#111;
padding:25px;
border-radius:20px;
margin-bottom:20px;
border:1px solid #222;
}

.task-title{
font-size:24px;
margin-bottom:10px;
color:#00b7ff;
}

.reward{
color:#00ff99;
font-weight:bold;
margin-bottom:15px;
}

.status{
margin-bottom:15px;
color:#ffd700;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
background:linear-gradient(90deg,#7b2cff,#a855f7);
color:white;
}

button:disabled{
background:#444;
cursor:not-allowed;
}

.back{
margin-bottom:20px;
}

</style>
</head>
<body>

<div class="logo">CoinTube</div>

<button class="back"
onclick="location.href='home.html'">
🏠 Back Home
</button>

<div class="card">

<h2 style="color:#ffd700;">
🎥 Video Progress
</h2>

<div
id="progress"
style="
margin-top:10px;
color:#00ff99;
font-size:18px;
">
Loading...
</div>

</div>

<div class="task-title">
🎥 Task 1
</div>

<div class="reward">
+10 Coins
</div>

<div
class="status"
id="status1">
Available
</div>

<button
id="task1"
onclick="openTask(1)">
Start Task
</button>

</div>

<div class="card">

<div class="task-title">
🎥 Task 2
</div>

<div class="reward">
+10 Coins
</div>

<div
class="status"
id="status2">
Locked
</div>

<button
id="task2"
disabled
onclick="openTask(2)">
Start Task
</button>

</div>

<div class="card">

<div class="task-title">
🎥 Task 3
</div>

<div class="reward">
+10 Coins
</div>

<div
class="status"
id="status3">
Locked
</div>

<button
id="task3"
disabled
onclick="openTask(3)">
Start Task
</button>

</div>

<script>

const RESET_TIME = 12 * 60 * 60 * 1000;

let taskData =
JSON.parse(
localStorage.getItem("videoTaskData")
) || {
completed: [],
lastReset: Date.now()
};

function resetTasksIfNeeded(){

const now = Date.now();

if(
now - taskData.lastReset >
RESET_TIME
){

taskData = {
completed: [],
lastReset: now
};

localStorage.setItem(
"videoTaskData",
JSON.stringify(taskData)
);

}

}

function loadTasks(){

resetTasksIfNeeded();

const completed =
taskData.completed;

for(let i=1;i<=3;i++){

const btn =
document.getElementById(
"task"+i
);

const status =
document.getElementById(
"status"+i
);

if(completed.includes(i)){

status.innerHTML =
"✅ Completed";

btn.disabled = true;

btn.innerText =
"Completed";

}

}

if(
completed.includes(1) &&
!completed.includes(2)
){

task2.disabled = false;

status2.innerHTML =
"🟢 Available";

}

if(
completed.includes(2) &&
!completed.includes(3)
){

task3.disabled = false;

status3.innerHTML =
"🟢 Available";

}

if(completed.length === 3){

let remaining =
RESET_TIME -
(
Date.now() -
taskData.lastReset
);

let hours =
Math.floor(
remaining /
(1000*60*60)
);

document.getElementById(
"progress"
).innerHTML =
"⏳ All tasks completed. New tasks in "
+ hours +
" hours";

}else{

document.getElementById(
"progress"
).innerHTML =
"🎯 Completed "
+
completed.length
+
"/3 Tasks";

}

}

function openTask(task){

localStorage.setItem(
"currentTask",
task
);

location.href =
"watch-video.html";

}

loadTasks();

</script>

</body>
</html>
