<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Tasks - CoinTube</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#080811;
color:white;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logo{
font-size:32px;
font-weight:900;

background:linear-gradient(
90deg,
#ffd700,
#7b2cff
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.back-btn{
padding:10px 15px;
background:#7b2cff;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

.balance{
background:#151522;
padding:20px;
border-radius:15px;
margin-bottom:25px;
font-size:24px;
font-weight:bold;
}

.tasks{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.task-card{
background:#13131d;
padding:20px;
border-radius:18px;
border:1px solid #222;
}

.task-card h3{
margin-bottom:10px;
}

.task-card p{
color:#aaa;
margin-bottom:15px;
}

.reward{
background:#1f1f30;
padding:8px 12px;
display:inline-block;
border-radius:10px;
color:#00ff99;
margin-bottom:15px;
}

.btn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
margin-top:10px;
}

.watch{
background:#7b2cff;
color:white;
}

.claim{
background:#00aa55;
color:white;
}

</style>
</head>
<body>

<div class="header">

<div class="logo">
CoinTube
</div>

<button
class="back-btn"
onclick="location.href='home.html'"
>
← Home
</button>

</div>

<div class="balance">

Coins:
<span id="coins">0</span>

</div>

<div class="tasks">

<div class="task-card">

<h3>🎥 Video Task #1</h3>

<p>
Watch this video and earn coins.
</p>

<div class="reward">
+10 Coins
</div>

<button
class="btn watch"
onclick="watchVideo('https://www.youtube.com/watch?v=dQw4w9WgXcQ')"
>
Watch Video
</button>

<button
class="btn claim"
onclick="claimCoins(10)"
>
Claim Coins
</button>

</div>

<div class="task-card">

<h3>🎥 Video Task #2</h3>

<p>
Complete video task reward.
</p>

<div class="reward">
+10 Coins
</div>

<button
class="btn watch"
onclick="watchVideo('https://www.youtube.com/watch?v=jNQXAC9IVRw')"
>
Watch Video
</button>

<button
class="btn claim"
onclick="claimCoins(10)"
>
Claim Coins
</button>

</div>

<div class="task-card">

<h3>🎥 Video Task #3</h3>

<p>
Watch and collect reward.
</p>

<div class="reward">
+10 Coins
</div>

<button
class="btn watch"
onclick="watchVideo('https://www.youtube.com/')"
>
Watch Video
</button>

<button
class="btn claim"
onclick="claimCoins(10)"
>
Claim Coins
</button>

</div>

</div>

<script>

let coins =
parseInt(
localStorage.getItem("coins")
) || 0;

document.getElementById("coins")
.innerText = coins;

function watchVideo(url){

window.open(
url,
"_blank"
);

}

function claimCoins(value){

coins += value;

localStorage.setItem(
"coins",
coins
);

document.getElementById("coins")
.innerText = coins;

alert(
"+" + value + " Coins Added!"
);

}

</script>

</body>
</html>
