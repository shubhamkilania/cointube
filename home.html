<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoinTube Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b0b0f;
    color:white;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    height:100vh;
    background:#111;
    padding:20px;
    position:fixed;
    left:0;
    top:0;
    border-right:1px solid #2a2a2a;
}

.logo{
    font-size:22px;
    font-weight:900;
    margin-bottom:30px;
    background:linear-gradient(90deg,#7b2cff,#00b7ff,#ffd700);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.sidebar a{
    display:block;
    color:#ccc;
    text-decoration:none;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    transition:0.2s;
}

.sidebar a:hover{
    background:#1f1f2a;
    color:white;
}

/* MAIN AREA */
.main{
    margin-left:260px;
    padding:20px;
    width:100%;
}

/* TOP BAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.topbar h2{
    font-size:22px;
}

.profile{
    background:#1f1f2a;
    padding:10px 15px;
    border-radius:12px;
}

/* COIN CARD */
.coin-card{
    background:linear-gradient(135deg,#1a1a2e,#2b1055);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.coin-card h1{
    font-size:28px;
}

.coin{
    font-size:26px;
    color:#00ff99;
    font-weight:bold;
}

/* TASK GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.card{
    background:#141420;
    padding:20px;
    border-radius:15px;
    border:1px solid #2a2a2a;
}

.card h3{
    margin-bottom:10px;
}

.card p{
    color:#aaa;
    font-size:14px;
    margin-bottom:15px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#7b2cff,#a855f7);
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">CoinTube</div>

    <a href="#">🏠 Home</a>
    <a href="#">📊 Dashboard</a>
    <a href="#">👥 Referral</a>
    <a href="#">🏆 Leaderboard</a>
    <a href="login.html">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <h2>Welcome Back 👋</h2>
        <div class="profile">User</div>
    </div>

    <!-- COIN BOX -->
    <div class="coin-card">
        <div>
            <h1>Your Balance</h1>
            <p>Keep earning coins daily</p>
        </div>
        <div class="coin" id="coins">0</div>
    </div>

    <!-- TASKS -->
    <div class="grid">

        <div class="card">
            <h3>🎥 Watch Video</h3>
            <p>Earn 10 coins per video</p>
            <button onclick="earn(10)">Watch</button>
        </div>

        <div class="card">
            <h3>📅 Daily Check-in</h3>
            <p>Earn daily bonus</p>
            <button onclick="earn(20)">Claim</button>
        </div>

        <div class="card">
            <h3>👥 Refer Friends</h3>
            <p>Earn 100 coins per referral</p>
            <button>Invite</button>
        </div>

        <div class="card">
            <h3>🏆 Leaderboard</h3>
            <p>Top users get rewards</p>
            <button>View</button>
        </div>

    </div>

</div>

<script>
let coins = localStorage.getItem("coins") || 0;
document.getElementById("coins").innerText = coins;

function earn(val){
    coins = parseInt(coins) + val;
    localStorage.setItem("coins", coins);
    document.getElementById("coins").innerText = coins;
}
</script>

</body>
</html>
