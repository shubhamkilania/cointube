<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - CoinTube</title>

<style>

body{
background:#080811;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.box{
width:400px;
background:#111;
padding:30px;
border-radius:20px;
border:1px solid #222;
}

.logo{
font-size:40px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
background:linear-gradient(90deg,#ffd700,#7b2cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#1c1c28;
color:white;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
background:linear-gradient(90deg,#7b2cff,#a855f7);
color:white;
font-size:16px;
}

#statusText{
margin-top:15px;
text-align:center;
color:#ffd700;
}

.link{
margin-top:15px;
text-align:center;
}

a{
color:#00b7ff;
text-decoration:none;
}

</style>
</head>
<body>

<div class="box">

<div class="logo">CoinTube</div>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button id="loginBtn">
Login
</button>
  
<div class="link">
<a href="reset.html">
Forgot Password?
</a>
</div>
  
<div id="statusText"></div>

<div class="link">
Don't have an account?
<a href="register.html">Register</a>
</div>

</div>

<script type="module" src="login.js"></script>
  
</body>
</html>
