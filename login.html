<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - CoinTube</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#050505;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.login-box{
    width:400px;
    background:#111;
    padding:40px;
    border-radius:20px;
    border:1px solid #7b2cff;
    box-shadow:0 0 20px rgba(123,44,255,.3);
}

.logo{
    text-align:center;
    font-size:40px;
    font-weight:900;
    margin-bottom:10px;

    background:linear-gradient(90deg,#7b2cff,#00b7ff,#ffd700);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    text-align:center;
    color:#bbb;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:#1a1a1a;
    color:white;
}

input:focus{
    outline:1px solid #7b2cff;
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#7b2cff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.login-btn:hover{
    opacity:.9;
}

.register-link{
    text-align:center;
    margin-top:20px;
}

.register-link a{
    color:#00b7ff;
    text-decoration:none;
}

</style>
</head>
<body>

<div class="login-box">

    <div class="logo">
        CoinTube
    </div>

    <p class="subtitle">
        Login to your account
    </p>

    <input type="text" placeholder="Phone Number">

    <input type="password" placeholder="Password">

    <button class="login-btn">
        Login
    </button>

    <div class="register-link">
        Don't have an account?
        <a href="register.html">Register</a>
    </div>

</div>
<script type="module" src="firebase-config.js"></script>
    
</body>
</html>
