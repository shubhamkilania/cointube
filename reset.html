<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - CoinTube</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#050505;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.box{
    width:400px;
    background:#111;
    padding:40px;
    border-radius:20px;
    border:1px solid #7b2cff;
    text-align:center;
    box-shadow:0 0 25px rgba(123,44,255,.3);
}

.logo{
    font-size:38px;
    font-weight:900;
    margin-bottom:15px;
    background:linear-gradient(90deg,#7b2cff,#00b7ff,#ffd700);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border:none;
    border-radius:10px;
    background:#1a1a1a;
    color:white;
}

input:focus{
    outline:1px solid #7b2cff;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#7b2cff,#a855f7);
    color:white;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#status{
    margin-top:10px;
    font-size:13px;
    color:#bbb;
}
</style>
</head>

<body>

<div class="box">

    <div class="logo">CoinTube</div>

    <input id="phone" placeholder="+91XXXXXXXXXX">

    <button id="sendOtpBtn">Send OTP</button>

    <input id="otp" placeholder="Enter OTP">

    <input id="newPassword" type="password" placeholder="New Password">

    <button id="resetBtn">Reset Password</button>

    <div id="status"></div>

</div>

<div id="recaptcha-container"></div>

<script type="module">
import {
  auth,
  RecaptchaVerifier,
  signInWithPhoneNumber,
  db,
  doc,
  updateDoc
} from "./firebase-config.js";

let confirmationResult;

/* ---------------- STATUS ---------------- */
function status(msg, color="#bbb"){
  const el = document.getElementById("status");
  el.innerText = msg;
  el.style.color = color;
}

/* ---------------- RECAPTCHA ---------------- */
window.recaptchaVerifier = new RecaptchaVerifier(
  auth,
  "recaptcha-container",
  {
    size: "invisible"
  }
);

recaptchaVerifier.render();

/* ---------------- SEND OTP ---------------- */
document.getElementById("sendOtpBtn").addEventListener("click", async () => {

  const phone = document.getElementById("phone").value;

  if (!phone) {
    status("Enter phone number", "red");
    return;
  }

  try {
    status("Sending OTP...", "#00b7ff");

    confirmationResult = await signInWithPhoneNumber(
      auth,
      phone,
      window.recaptchaVerifier
    );

    status("OTP sent ✔", "#00ff99");

  } catch (err) {
    console.error(err);
    status(err.message, "red");
  }

});

/* ---------------- RESET PASSWORD ---------------- */
document.getElementById("resetBtn").addEventListener("click", async () => {

  const otp = document.getElementById("otp").value;
  const newPassword = document.getElementById("newPassword").value;
  const phone = document.getElementById("phone").value;

  if (!otp || !newPassword) {
    status("Fill all fields", "red");
    return;
  }

  try {

    status("Verifying OTP...", "#00b7ff");

    await confirmationResult.confirm(otp);

    status("Updating password...", "#00b7ff");

    await updateDoc(doc(db, "users", phone), {
      password: newPassword
    });

    status("Password updated 🎉", "#00ff99");

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1200);

  } catch (err) {
    console.error(err);
    status(err.message, "red");
  }

});
</script>

</body>
</html>
