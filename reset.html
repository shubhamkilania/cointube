<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - CoinTube</title>

<style>

body{
background:#080811;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.box{
width:400px;
background:#111;
padding:30px;
border-radius:20px;
border:1px solid #222;
}

.logo{
font-size:40px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
background:linear-gradient(90deg,#ffd700,#7b2cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#1c1c28;
color:white;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
background:linear-gradient(90deg,#7b2cff,#a855f7);
color:white;
font-size:16px;
}

#status{
margin-top:15px;
text-align:center;
color:#ffd700;
}

.link{
margin-top:15px;
text-align:center;
}

a{
color:#00b7ff;
text-decoration:none;
}

</style>
</head>
<body>

<div class="box">

<div class="logo">CoinTube</div>

<input
id="email"
type="email"
placeholder="Enter your email"
>

<button id="resetBtn">
Send Reset Link
</button>

<div id="status"></div>

<div class="link">
<a href="login.html">
Back to Login
</a>
</div>

</div>

<script type="module">

import { supabase } from "./supabase.js";

document
.getElementById("resetBtn")
.addEventListener("click", async () => {

const email =
document.getElementById("email")
.value.trim();

const status =
document.getElementById("status");

if(!email){

status.innerText =
"Enter your email";

return;

}

try{

const { error } =
await supabase.auth.resetPasswordForEmail(
email
);

if(error) throw error;

status.innerText =
"Password reset email sent. Check your inbox.";

}catch(err){

console.error(err);

status.innerText =
err.message;

}

});

</script>

</body>
</html>
