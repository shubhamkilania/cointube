<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - CoinTube</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
padding:20px;
}

.box{
width:400px;
background:#111;
padding:40px;
border-radius:20px;
border:1px solid #7b2cff;
text-align:center;
box-shadow:0 0 25px rgba(123,44,255,.3);
}

.logo{
font-size:38px;
font-weight:900;
margin-bottom:15px;

background:linear-gradient(
90deg,
#7b2cff,
#00b7ff,
#ffd700
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
color:#bbb;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#1a1a1a;
color:white;
}

input:focus{
outline:1px solid #7b2cff;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;

background:linear-gradient(
90deg,
#7b2cff,
#a855f7
);

color:white;
cursor:pointer;
}

button:hover{
opacity:.9;
}

#status{
margin-top:15px;
font-size:14px;
color:#bbb;
}

.back{
margin-top:20px;
}

.back a{
color:#00b7ff;
text-decoration:none;
}
</style>

</head>

<body>

<div class="box">

<div class="logo">
CoinTube
</div>

<p class="subtitle">
Enter your registered email address
</p>

<input
id="email"
type="email"
placeholder="Email Address"

>

<button id="resetBtn">
Send Reset Link
</button>

<div id="status"></div>

<div class="back">
<a href="login.html">
Back to Login
</a>
</div>

</div>

<script type="module">

import {
auth,
sendPasswordResetEmail
}
from "./firebase-config.js";

function status(msg,color="#bbb"){
const el=document.getElementById("status");
el.innerText=msg;
el.style.color=color;
}

document
.getElementById("resetBtn")
.addEventListener("click",async()=>{

const email=
document.getElementById("email").value.trim();

if(!email){

status(
"Enter your email address",
"red"
);

return;
}

try{

status(
"Sending reset link...",
"#00b7ff"
);

await sendPasswordResetEmail(
auth,
email
);

status(
"Password reset email sent ✔",
"#00ff99"
);

}catch(error){

console.error(error);

status(
error.message,
"red"
);

}

});

</script>

</body>
</html>
