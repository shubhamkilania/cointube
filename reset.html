<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - CoinTube</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#080811;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
color:white;
}

.box{
width:100%;
max-width:420px;
background:#111;
padding:30px;
border-radius:22px;
border:1px solid #222;
box-shadow:0 0 30px rgba(123,44,255,.15);
}

.logo{
font-size:42px;
font-weight:900;
text-align:center;
margin-bottom:10px;
background:linear-gradient(90deg,#ffd700,#7b2cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;
color:#999;
margin-bottom:25px;
line-height:1.6;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#1c1c28;
color:white;
font-size:15px;
}

input:focus{
outline:2px solid #7b2cff;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
background:linear-gradient(90deg,#7b2cff,#a855f7);
color:white;
font-size:16px;
font-weight:bold;
transition:.3s;
}

button:hover{
opacity:.9;
}

#status{
margin-top:15px;
text-align:center;
padding:10px;
border-radius:10px;
font-size:14px;
color:#ffd700;
}

.link{
margin-top:20px;
text-align:center;
}

a{
color:#00b7ff;
text-decoration:none;
}

a:hover{
text-decoration:underline;
}

</style>
</head>
<body>

<div class="box">

<div class="logo">
CoinTube
</div>

<div class="subtitle">
Enter your registered email address.<br>
We'll send you a password reset link.
</div>

<input
id="email"
type="email"
placeholder="Enter your email"
>

<button id="resetBtn">
📧 Send Reset Link
</button>

<div id="status"></div>

<div class="link">
<a href="login.html">
← Back to Login
</a>
</div>

</div>

<script type="module">

import { supabase } from "./supabase.js";

document
.getElementById("resetBtn")
.addEventListener("click", async () => {

const email =
document.getElementById("email")
.value.trim();

const status =
document.getElementById("status");

if(!email){

status.innerText =
"Please enter your email address.";

return;

}

status.innerText =
"Sending reset link...";

try{

const { error } =
await supabase.auth.resetPasswordForEmail(
email
);

if(error) throw error;

status.innerText =
"✅ Password reset email sent. Check your inbox and spam folder.";

}catch(err){

console.error(err);

status.innerText =
"❌ " + err.message;

}

});

</script>

</body>
</html>
