<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard - CoinTube</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#080811;
color:white;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
}

.logo{
text-align:center;
font-size:48px;
font-weight:900;
margin-bottom:25px;
background:linear-gradient(90deg,#ffd700,#7b2cff,#a855f7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.title{
text-align:center;
font-size:32px;
margin-bottom:25px;
color:#ffffff;
}

.top3{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:30px;
}

.winner{
padding:25px;
border-radius:20px;
text-align:center;
}

.first{
background:linear-gradient(135deg,#ffd700,#ffb700);
color:black;
}

.second{
background:linear-gradient(135deg,#7b2cff,#a855f7);
}

.third{
background:linear-gradient(135deg,#3f1d72,#5b21b6);
}

.winner h2{
font-size:45px;
margin-bottom:10px;
}

.winner h3{
margin-bottom:10px;
}

.board{
background:#13131d;
border-radius:20px;
overflow:hidden;
border:1px solid #2b2b3b;
margin-bottom:25px;
}

.row{
display:flex;
justify-content:space-between;
padding:15px 20px;
border-bottom:1px solid #222;
}

.row:last-child{
border-bottom:none;
}

.rank{
color:#ffd700;
font-weight:bold;
}

.my-card{
background:linear-gradient(135deg,#160026,#2f0057);
padding:25px;
border-radius:20px;
margin-bottom:25px;
text-align:center;
}

.my-rank{
font-size:42px;
font-weight:bold;
color:#ffd700;
margin:10px 0;
}

.notice{
background:#13131d;
padding:20px;
border-radius:15px;
border:1px solid #222;
text-align:center;
color:#bbb;
margin-bottom:25px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
background:linear-gradient(90deg,#7b2cff,#a855f7);
color:white;
}

button:hover{
opacity:.9;
}

.loading{
text-align:center;
padding:20px;
color:#bbb;
}

@media(max-width:768px){

.title{
font-size:26px;
}

.row{
font-size:14px;
padding:12px;
}

.my-rank{
font-size:32px;
}

}

</style>
</head>
<body>

<div class="container">

<div class="logo">
CoinTube
</div>

<h1 class="title">
🏆 Global Leaderboard
</h1>

<div class="top3">

<div class="winner first">
<h2>🥇</h2>
<h3 id="firstName">Loading...</h3>
<p id="firstCoins">0 Coins</p>
</div>

<div class="winner second">
<h2>🥈</h2>
<h3 id="secondName">Loading...</h3>
<p id="secondCoins">0 Coins</p>
</div>

<div class="winner third">
<h2>🥉</h2>
<h3 id="thirdName">Loading...</h3>
<p id="thirdCoins">0 Coins</p>
</div>

</div>

<div class="board" id="leaderboard">

<div class="loading">
Loading Leaderboard...
</div>

</div>

<div class="my-card">

<h2>👤 Your Ranking</h2>

<div class="my-rank" id="myRank">
#--
</div>

<p id="myCoins">
0 Coins
</p>

</div>

<div class="notice">
🚀 Rankings are now connected to CoinTube accounts.<br><br>
Earn more coins by completing tasks and watching videos.
</div>

<button onclick="location.href='home.html'">
🏠 Back Home
</button>

</div>

<script type="module">

import { supabase } from "./supabase.js";

async function loadLeaderboard(){

  const {
    data: users,
    error
  } = await supabase
  .from("profiles")
  .select("*")
  .order("coins", {
    ascending: false
  });

  if(error){

    console.error(error);

    document.getElementById(
      "leaderboard"
    ).innerHTML =
    "<div class='loading'>Failed to load leaderboard.</div>";

    return;
  }

  if(!users || users.length === 0){

    document.getElementById(
      "leaderboard"
    ).innerHTML =
    "<div class='loading'>No users found.</div>";

    return;
  }

  document.getElementById("firstName").innerText =
  users[0]?.username || "User";

  document.getElementById("firstCoins").innerText =
  (users[0]?.coins || 0) + " Coins";

  document.getElementById("secondName").innerText =
  users[1]?.username || "User";

  document.getElementById("secondCoins").innerText =
  (users[1]?.coins || 0) + " Coins";

  document.getElementById("thirdName").innerText =
  users[2]?.username || "User";

  document.getElementById("thirdCoins").innerText =
  (users[2]?.coins || 0) + " Coins";

  let html = "";

  users.forEach((user,index)=>{

    html += `

    <div class="row">

      <span class="rank">
      #${index + 1}
      </span>

      <span>
      ${user.username || "User"}
      </span>

      <span>
      ${user.coins || 0}
      </span>

    </div>

    `;

  });

  document.getElementById(
    "leaderboard"
  ).innerHTML = html;

  const {
    data:{ user }
  } = await supabase.auth.getUser();

  if(user){

    const myIndex =
    users.findIndex(
      u => u.id === user.id
    );

    if(myIndex !== -1){

      document.getElementById(
        "myRank"
      ).innerText =
      "#" + (myIndex + 1);

      document.getElementById(
        "myCoins"
      ).innerText =
      (users[myIndex].coins || 0) +
      " Coins";

    }

  }

}

loadLeaderboard();

</script>

<script type="module" src="auth-check.js"></script>

</body>
</html>
